name: Docker Publish

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - master
      - main
  schedule:
    - cron: "44 2 * * *"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: centrix-erp-frontend-web

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: type=sha,format=short

      - name: Resolve image tag for Helm
        id: image_tag
        run: echo "value=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'https://centrixapi.betsassured.com/api/v1' }}
            NEXT_PUBLIC_USE_COOKIE_AUTH=${{ vars.NEXT_PUBLIC_USE_COOKIE_AUTH || 'true' }}
            NEXT_PUBLIC_COMPANY_CODE=${{ vars.NEXT_PUBLIC_COMPANY_CODE || 'DEMO' }}
            NEXT_PUBLIC_COMPANY_NAME=${{ vars.NEXT_PUBLIC_COMPANY_NAME || 'Centrix ERP' }}

      - name: Check out pitchpredk3ssetup
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/pitchpredk3ssetup
          path: pitchpredk3ssetup
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Update Helm image tag
        if: github.event_name != 'pull_request'
        run: |
          TAG="${{ steps.image_tag.outputs.value }}"
          FILE="pitchpredk3ssetup/centrix-erp-frontend-web/values.yaml"
          sed -i "s|^\([[:space:]]*tag:\).*|\1 ${TAG}|" "$FILE"
          echo "Updated ${FILE} -> ${TAG}"

      - name: Commit and push pitchpredk3ssetup
        if: github.event_name != 'pull_request'
        run: |
          cd pitchpredk3ssetup
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add centrix-erp-frontend-web/values.yaml
          if git diff --staged --quiet; then
            echo "No tag changes to commit."
            exit 0
          fi
          git commit -m "chore(centrix-erp-frontend-web): bump image tag to ${{ steps.image_tag.outputs.value }}"
          git push

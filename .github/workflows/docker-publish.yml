name: Docker Publish

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - master
      - main
  schedule:
    - cron: "44 2 * * *"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: centrix-erp-frontend-web

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: type=sha,format=short

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'https://centrixapi.betsassured.com/api/v1' }}
            NEXT_PUBLIC_COMPANY_CODE=${{ vars.NEXT_PUBLIC_COMPANY_CODE || 'DEMO' }}
            NEXT_PUBLIC_COMPANY_NAME=${{ vars.NEXT_PUBLIC_COMPANY_NAME || 'Centrix ERP' }}

      - name: Check out the pitchpredk3ssetup repo
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/pitchpredk3ssetup
          path: pitchpredk3ssetup
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Update values.yaml with new image tag
        if: github.event_name != 'pull_request'
        run: |
          SHORT_SHA_PART="${{ steps.meta.outputs.tags }}"
          SHORT_SHA_PART="$(echo "$SHORT_SHA_PART" | awk -F':' '{print $2}' | cut -c1-11)"
          sed -i "s|tag:.*|tag: $SHORT_SHA_PART|" pitchpredk3ssetup/centrix-erp-frontend-web/values.yaml
          echo "SHORT_SHA_PART=$SHORT_SHA_PART" >> "$GITHUB_ENV"
          echo "Updated tag in centrix-erp-frontend-web/values.yaml to $SHORT_SHA_PART"

      - name: Commit and push changes to pitchpredk3ssetup repo
        if: github.event_name != 'pull_request'
        run: |
          cd pitchpredk3ssetup
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add centrix-erp-frontend-web/values.yaml
          git commit -m "Update centrix-erp-frontend-web image tag to $SHORT_SHA_PART"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

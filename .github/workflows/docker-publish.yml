name: Docker Publish

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - master
      - main
  schedule:
    - cron: "44 2 * * *"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: centrix-erp-frontend-web

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: type=sha,format=short

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'https://centrixapi.betsassured.com/api/v1' }}
            NEXT_PUBLIC_COMPANY_CODE=${{ vars.NEXT_PUBLIC_COMPANY_CODE || 'DEMO' }}
            NEXT_PUBLIC_COMPANY_NAME=${{ vars.NEXT_PUBLIC_COMPANY_NAME || 'Centrix ERP' }}

      - name: Check out pitchpredk3ssetup
        if: github.event_name != 'pull_request' && secrets.PERSONAL_ACCESS_TOKEN != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/pitchpredk3ssetup
          path: pitchpredk3ssetup
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Update Helm image tag
        if: github.event_name != 'pull_request' && secrets.PERSONAL_ACCESS_TOKEN != ''
        id: helm_tag
        run: |
          set -euo pipefail
          IMAGE_TAG="$(echo "${{ steps.meta.outputs.tags }}" | awk -F':' '{print $2}' | head -n1 | tr -d '[:space:]')"
          VALUES_FILE="pitchpredk3ssetup/centrix-erp-frontend-web/values.yaml"
          if [ ! -f "$VALUES_FILE" ]; then
            echo "Missing ${VALUES_FILE} in pitchpredk3ssetup checkout" >&2
            exit 1
          fi
          sed -i "s|^\([[:space:]]*tag:\).*|\1 ${IMAGE_TAG}|" "$VALUES_FILE"
          echo "Updated ${VALUES_FILE} -> ${IMAGE_TAG}"
          echo "value=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Commit and push pitchpredk3ssetup
        if: github.event_name != 'pull_request' && secrets.PERSONAL_ACCESS_TOKEN != ''
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          cd pitchpredk3ssetup
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add centrix-erp-frontend-web/values.yaml
          if git diff --staged --quiet; then
            echo "Helm tag already up to date (${{ steps.helm_tag.outputs.value }})." >&2
            exit 0
          fi
          git commit -m "chore(centrix-erp-frontend-web): bump image tag to ${{ steps.helm_tag.outputs.value }}"
          git push

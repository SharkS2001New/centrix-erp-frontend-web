name: Build Print Agent MSI

on:
  workflow_dispatch:
  push:
    paths:
      - "print-agent/**"

jobs:
  build-msi:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install WiX Toolset
        run: choco install wixtoolset -y --no-progress

      - name: Add WiX to PATH
        shell: pwsh
        run: |
          $wixBin = "${env:ProgramFiles(x86)}\WiX Toolset v3.14\bin"
          if (-not (Test-Path $wixBin)) {
            $wixBin = "${env:ProgramFiles(x86)}\WiX Toolset v3.11\bin"
          }
          if (-not (Test-Path $wixBin)) {
            throw "WiX Toolset bin folder not found after install"
          }
          echo "$wixBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build MSI
        shell: pwsh
        working-directory: print-agent
        run: ./scripts/build-msi.ps1 -Version "0.1.0.0"

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: CentrixPrintAgent-msi
          path: print-agent/dist/*.msi
          if-no-files-found: error
